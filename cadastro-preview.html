<style>

  .card{width:100%;max-width:520px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.16));
    border:1px solid var(--line);border-radius:20px;padding:24px 22px 28px;box-shadow:0 24px 70px rgba(0,0,0,.45)}

  .aviso{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    font-size:12.5px;color:var(--gold);margin:12px 0 18px;line-height:1.5}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);opacity:.85;margin:14px 0 5px}

  select option{color:#000}
  input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(229,183,105,.18)}
  .hp{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
  button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:11px;cursor:pointer;
    background:linear-gradient(180deg,#fff7e9,var(--gold-2) 40%,var(--gold));color:var(--ink);
    font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.03em}
  button:disabled{opacity:.6;cursor:default}
  .erro{color:#ffc0c0;font-size:12px;margin-top:5px;min-height:15px}
  .msg{margin-top:16px;font-size:14px;text-align:center;line-height:1.5}
  .msg.ok{color:var(--gold-2)} .msg.err{color:#ffc0c0}

      <input class="hp" id="hp" tabindex="-1" autocomplete="off" placeholder="Deixe em branco">
      <button id="btn" type="submit">Enviar cadastro</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>

const $ = id => document.getElementById(id);
const soDig = s => (s||'').replace(/\D/g,'');
function validaCpf(v){ const c=soDig(v); if(c.length!==11||/^(\d)\1{10}$/.test(c))return false;
  const dv=n=>{let s=0;for(let i=0;i<n;i++)s+=+c[i]*(n+1-i);let r=(s*10)%11;return r===10?0:r;};
  return dv(9)===+c[9]&&dv(10)===+c[10]; }
function mascaraCpf(v){const c=soDig(v).slice(0,11);return c.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3').replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/,'$1.$2.$3-$4');}
function mascaraTel(v){const c=soDig(v).slice(0,11);if(c.length<=2)return c;if(c.length<=7)return`(${c.slice(0,2)}) ${c.slice(2)}`;return`(${c.slice(0,2)}) ${c.slice(2,7)}-${c.slice(7)}`;}
$('cpf').addEventListener('input',e=>e.target.value=mascaraCpf(e.target.value));
$('telefone').addEventListener('input',e=>e.target.value=mascaraTel(e.target.value));
(function(){ if(D&&D.lojas){const s=$('loja');for(const l of D.lojas){const o=document.createElement('option');o.value=l.c+' - '+l.n.replace(/^\d+\s*-\s*/,'');o.dataset.c=l.c;o.textContent=l.n;s.appendChild(o);} } })();
function erro(campo,txt){$('e-'+campo).textContent=txt||'';return !txt;}
function valida(){
  let ok=true;
  ok &= erro('nome', $('nome').value.trim().split(/\s+/).filter(Boolean).length>=2 ? '' : 'Digite nome e sobrenome.');
  ok &= erro('cpf', validaCpf($('cpf').value) ? '' : 'CPF inválido.');
  ok &= erro('telefone', soDig($('telefone').value).length===11 ? '' : 'Telefone com DDD + 9 dígitos.');
  ok &= erro('email', /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test($('email').value.trim()) ? '' : 'Email inválido.');
  ok &= erro('loja', $('loja').value ? '' : 'Selecione a sua loja.');
  return !!ok;
}
function msg(t,cls){const m=$('msg');m.textContent=t||'';m.className='msg '+(cls||'');}
$('f').addEventListener('submit', async e=>{
  e.preventDefault();
  if($('hp').value){ msg('Cadastro enviado! Aguarde a aprovação.','ok'); return; } // bot
  if(!valida()) return;
  const opt=$('loja').selectedOptions[0];
  const corpo={nome:$('nome').value.trim(), cpf:soDig($('cpf').value), telefone:soDig($('telefone').value),
    email:$('email').value.trim().toLowerCase(), codigo_loja:opt.dataset.c, loja_label:$('loja').value, hp:''};
  $('btn').disabled=true; msg('Enviando…','ok');
  try{
    const r=await fetch(D.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(corpo)});
    const d=await r.json();
    if(d.status==='ok'){ msg('✓ Cadastro enviado! Agora é só aguardar a aprovação da equipe. Não precisa preencher de novo.','ok'); $('f').reset(); }
    else if(d.status==='ja_na_peoplefy'){ msg('Seu acesso na Peoplefy já está pronto! Entre com seu email — não precisa se cadastrar de novo.','ok'); }
    else if(d.status==='em_aprovacao'){ msg('Você já enviou seu cadastro e ele está em aprovação interna. Aguarde — não precisa refazer.','ok'); }
    else if(d.status==='erro_validacao'){ msg('Confira os dados: '+(d.campo||'')+'.','err'); }
    else { msg('Não foi possível enviar agora. Tente novamente em instantes.','err'); }
  }catch(err){ msg('Falha de conexão. Tente novamente.','err'); }
  finally{ $('btn').disabled=false; }
});
