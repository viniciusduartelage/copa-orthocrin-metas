<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Copa Orthocrin — Minhas Metas</title>
<style>
  :root{--wine:#7C1F3A;--wine2:#5c1129;--gold:#F8E0B8;--gold2:#e5b769;--ink:#3a0c1a;--line:rgba(248,224,184,.18)}
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--gold);
    background:radial-gradient(1200px 600px at 50% -10%,var(--wine),var(--wine2)) fixed;min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;padding:32px 16px}
  .card{width:100%;max-width:520px;background:rgba(0,0,0,.18);border:1px solid var(--line);
    border-radius:18px;padding:26px 24px 30px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  h1{font-size:20px;margin:0 0 2px;color:#fff;letter-spacing:.02em}
  .sub{font-size:13px;color:var(--gold);opacity:.75;margin:0 0 20px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--gold);opacity:.8;margin:14px 0 5px}
  input,select{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);
    background:rgba(255,255,255,.06);color:#fff;font-size:15px;outline:none}
  select option{color:#000}
  input:focus,select:focus{border-color:var(--gold2);background:rgba(255,255,255,.1)}
  .hint{margin:5px 0 0;font-size:11px;color:var(--gold);opacity:.6}
  button{width:100%;margin-top:20px;padding:12px;border:0;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--gold),var(--gold2));color:var(--ink);
    font-weight:800;font-size:15px;letter-spacing:.02em}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:16px;font-size:13px;min-height:18px;text-align:center}
  .msg.err{color:#ffb4b4} .msg.ok{color:var(--gold2)}
  .res{margin-top:22px;display:none}
  .res h2{font-size:16px;color:#fff;margin:0 0 2px}
  .res .loja{font-size:12px;color:var(--gold);opacity:.7;margin:0 0 14px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--gold2)}
  td.v{text-align:right;font-variant-numeric:tabular-nums;color:#fff;font-weight:700}
  .prox{margin-top:16px;font-size:12.5px;color:var(--gold2);text-align:center;font-weight:600}
  .dica{margin-top:18px;font-size:12px;color:var(--gold);opacity:.85;text-align:center;
    background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  .foot{margin-top:18px;font-size:11px;color:var(--gold);opacity:.55;text-align:center;line-height:1.5}
  .foot #atualizado{display:block;color:var(--gold2);opacity:1;font-weight:700;margin-bottom:6px}
</style></head>

const $ = id => document.getElementById(id);
function msg(t, cls){ const m=$('msg'); m.textContent=t||''; m.className='msg '+(cls||''); }
function b64(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
const brl = n => (n==null?'—':Number(n).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}));
function mostrar(d){
  $('rnome').textContent = d.nome || 'Você';
  $('rloja').textContent = d.loja || '';
  $('rbody').innerHTML = (d.metas||[]).map(x =>
    `<tr><td>Semana ${x.s}</td><td class="v">${brl(x.m)}</td></tr>`).join('')
    || '<tr><td colspan="2">Sem metas cadastradas ainda.</td></tr>';
  $('res').style.display='block';
}
async function ver(){
  $('res').style.display='none';
  const codigo=$('cod').value.trim(), email=$('email').value.trim().toLowerCase();
  if(!codigo || !email){ msg('Preencha o código da loja e o email.','err'); return; }
  if(!DADOS){ msg('Página não carregada corretamente.','err'); return; }
  $('btn').disabled=true; msg('Verificando…','ok');
  try{
    const salt=b64(DADOS.salt);
    const km=await crypto.subtle.importKey('raw', new TextEncoder().encode(codigo+'|'+email),
      'PBKDF2', false, ['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:DADOS.iters, hash:'SHA-256'}, km,
      {name:'AES-GCM', length:256}, false, ['decrypt']);
    for(const bl of DADOS.blobs){
      try{
        const pt=await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(bl.iv)}, key, b64(bl.ct));
        mostrar(JSON.parse(new TextDecoder().decode(pt))); msg('',''); return;
      }catch(e){}
    }
    msg('Não encontramos suas metas. Confira a loja e o email cadastrado. Sem email cadastrado? Fale com seu consultor.','err');
  }catch(e){ msg('Seu navegador não suporta a consulta segura (tente outro navegador).','err'); }
  finally{ $('btn').disabled=false; }
}
(function(){
  if(DADOS && DADOS.lojas){
    const s=$('cod');
    for(const l of DADOS.lojas){
      const o=document.createElement('option'); o.value=l.c; o.textContent=l.n; s.appendChild(o);
    }
  }
  if(DADOS && DADOS.atualizado){ $('atualizado').textContent = 'Metas atualizadas em ' + DADOS.atualizado; }
})();
</script>
