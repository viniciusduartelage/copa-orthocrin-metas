<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Copa Orthocrin — Minhas Metas</title>
<style>
  :root{--wine-950:#3a0c1a;--wine-900:#4a1020;--wine-800:#5e1729;--wine-700:#7c1f3a;
    --gold:#e5b769;--gold-2:#f8e0b8;--gold-deep:#c8912f;--ink:#3a0c1a;--line:rgba(248,224,184,.16)}
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--gold-2);
    min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;
    background:
      radial-gradient(1100px 520px at 18% -8%, rgba(184,54,94,.55), transparent 60%),
      radial-gradient(900px 480px at 88% 4%, rgba(229,183,105,.16), transparent 55%),
      radial-gradient(1200px 900px at 50% 120%, rgba(58,12,26,.92), transparent 70%),
      linear-gradient(160deg,var(--wine-900) 0%, var(--wine-800) 38%, var(--wine-950) 100%);
    background-attachment:fixed}
  .wrap{width:100%;max-width:500px}
  .brand{text-align:center;margin-bottom:20px}
  .brand img{width:150px;max-width:58%;height:auto;opacity:.96;filter:drop-shadow(0 2px 10px rgba(0,0,0,.45))}
  .kicker{margin:16px 0 4px;font-size:11px;letter-spacing:.34em;color:var(--gold);font-weight:700;
    text-transform:uppercase;opacity:.85}
  .title{margin:0;font-size:30px;font-weight:800;letter-spacing:-.01em;line-height:1.05;
    background:linear-gradient(180deg,#fff7e9 0%,var(--gold-2) 34%,var(--gold) 66%,var(--gold-deep) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.3))}
  .card{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.16));
    border:1px solid var(--line);border-radius:20px;padding:22px 22px 26px;overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08)}
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:120px;pointer-events:none;
    background:radial-gradient(60% 80% at 50% 0%, rgba(248,224,184,.10), transparent 70%)}
  .sub{position:relative;font-size:13px;color:var(--gold);opacity:.8;margin:0 0 4px;text-align:center}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;
    color:var(--gold);opacity:.85;margin:16px 0 6px}
  input,select{width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line);
    background:rgba(0,0,0,.22);color:#fff;font-size:15px;outline:none;transition:.15s}
  select option{color:#000}
  input::placeholder{color:rgba(248,224,184,.4)}
  input:focus,select:focus{border-color:var(--gold);background:rgba(0,0,0,.32);
    box-shadow:0 0 0 3px rgba(229,183,105,.18)}
  .hint{margin:6px 0 0;font-size:11px;color:var(--gold);opacity:.55}
  button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:11px;cursor:pointer;
    background:linear-gradient(180deg,#fff7e9,var(--gold-2) 40%,var(--gold) 100%);color:var(--ink);
    font-weight:800;font-size:14.5px;letter-spacing:.04em;text-transform:uppercase;
    box-shadow:0 8px 20px rgba(229,183,105,.25), inset 0 1px 0 rgba(255,255,255,.6)}
  button:hover{filter:brightness(1.04)} button:disabled{opacity:.6;cursor:default;filter:none}
  .msg{margin-top:16px;font-size:13px;min-height:18px;text-align:center}
  .msg.err{color:#ffc0c0} .msg.ok{color:var(--gold-2)}
  .res{margin-top:24px;display:none;position:relative}
  .who{display:flex;align-items:center;gap:11px;margin-bottom:16px;padding-bottom:14px;
    border-bottom:1px solid var(--line)}
  .who .medal{font-size:26px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))}
  .res h2{font-size:18px;color:#fff;margin:0;line-height:1.15}
  .res .loja{font-size:12px;color:var(--gold);opacity:.75;margin:2px 0 0}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:11px 12px;text-align:left;border-bottom:1px solid rgba(248,224,184,.10)}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--gold)}
  tbody tr:last-child td{border-bottom:0}
  td.v{text-align:right;font-variant-numeric:tabular-nums;color:#fff;font-weight:800}
  .prox{margin-top:18px;font-size:12.5px;color:var(--gold-2);text-align:center;font-weight:600}
  .dica{margin-top:20px;font-size:12px;color:var(--gold);opacity:.9;text-align:center;
    background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .foot{margin-top:16px;font-size:11px;text-align:center}
  .foot #atualizado{color:var(--gold-2);opacity:.85;font-weight:700}
</style></head>

const $ = id => document.getElementById(id);
function msg(t, cls){ const m=$('msg'); m.textContent=t||''; m.className='msg '+(cls||''); }
function b64(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
const brl = n => (n==null?'—':Number(n).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}));
function mostrar(d){
  $('rnome').textContent = d.nome || 'Você';
  $('rloja').textContent = d.loja || '';
  $('rbody').innerHTML = (d.metas||[]).map(x =>
    `<tr><td>Semana ${x.s}</td><td class="v">${brl(x.m)}</td></tr>`).join('')
    || '<tr><td colspan="2">Sem metas cadastradas ainda.</td></tr>';
  $('res').style.display='block';
}
async function ver(){
  $('res').style.display='none';
  const codigo=$('cod').value.trim(), email=$('email').value.trim().toLowerCase();
  if(!codigo || !email){ msg('Preencha o código da loja e o email.','err'); return; }
  if(!DADOS){ msg('Página não carregada corretamente.','err'); return; }
  $('btn').disabled=true; msg('Verificando…','ok');
  try{
    const salt=b64(DADOS.salt);
    const km=await crypto.subtle.importKey('raw', new TextEncoder().encode(codigo+'|'+email),
      'PBKDF2', false, ['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:DADOS.iters, hash:'SHA-256'}, km,
      {name:'AES-GCM', length:256}, false, ['decrypt']);
    for(const bl of DADOS.blobs){
      try{
        const pt=await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(bl.iv)}, key, b64(bl.ct));
        mostrar(JSON.parse(new TextDecoder().decode(pt))); msg('',''); return;
      }catch(e){}
    }
    msg('Não encontramos suas metas. Confira a loja e o email cadastrado. Sem email cadastrado? Fale com seu consultor.','err');
  }catch(e){ msg('Seu navegador não suporta a consulta segura (tente outro navegador).','err'); }
  finally{ $('btn').disabled=false; }
}
(function(){
  if(DADOS && DADOS.lojas){
    const s=$('cod');
    for(const l of DADOS.lojas){
      const o=document.createElement('option'); o.value=l.c; o.textContent=l.n; s.appendChild(o);
    }
  }
  if(DADOS && DADOS.atualizado){ $('atualizado').textContent = 'Metas atualizadas em ' + DADOS.atualizado; }
})();
</script>
